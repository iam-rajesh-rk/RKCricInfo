  sc.onclick = ()=>{ modal={type:'scorecard'}; render(); };
  const pdf = el('<button class="btn-pdf">📄 Export scorecard as PDF</button>');
  pdf.onclick = exportPDF;
  const nm = el('<button class="btn-primary">Start new match</button>');
  nm.onclick = newMatch;
  btnWrap.appendChild(sc); btnWrap.appendChild(pdf); btnWrap.appendChild(nm);
  frag.appendChild(btnWrap);
  return frag;

/* ============== MODALS ============== */
function renderModal(){
  const overlay = el('<div class="modal-overlay"></div>');
  const m = el('<div class="modal"></div>');
  overlay.appendChild(m);
  overlay.onclick = (e)=>{ if(e.target===overlay && (modal.type==='scorecard')){ modal=null; render(); } };

  if(modal.type==='noballRuns'){
    m.appendChild(el('<h3>No ball — runs off the bat</h3>'));
    const grid = el('<div class="opt-grid" style="grid-template-columns:repeat(4,1fr);"></div>');
    [0,1,2,3,4,6].forEach(r=>{
      const b = el(`<button class="opt-btn">${r}</button>`);
      b.onclick = ()=>{ recordNoBall(r); };
      grid.appendChild(b);
    });
    m.appendChild(grid);
  }
  else if(modal.type==='wideRuns'){
    m.appendChild(el('<h3>Wide — additional runs</h3>'));
    const grid = el('<div class="opt-grid" style="grid-template-columns:repeat(4,1fr);"></div>');
    [0,1,2,3,4,6].forEach(r=>{
      const b = el(`<button class="opt-btn">${r}</button>`);
      b.onclick = ()=>{ recordWide(r); };
      grid.appendChild(b);
    });
    m.appendChild(grid);
  }
  else if(modal.type==='extraRuns'){
    const label = modal.kind==='b' ? 'Bye — total runs' : 'Leg bye — total runs';
    m.appendChild(el(`<h3>${label}</h3>`));
    const grid = el('<div class="opt-grid" style="grid-template-columns:repeat(4,1fr);"></div>');
    [1,2,3,4].forEach(r=>{
      const b = el(`<button class="opt-btn">${r}</button>`);
      b.onclick = ()=>{ recordByeLegBye(modal.kind, r); };
      grid.appendChild(b);
    });
    m.appendChild(grid);
  }
  else if(modal.type==='wicketType'){
    m.appendChild(el('<h3>How was the batsman out?</h3>'));
    const types = ['Bowled','Caught','LBW','Stumped','Hit wicket','Run out'];
    types.forEach(t=>{
      const b = el(`<button class="list-btn">${t}</button>`);
      b.onclick = ()=>{
        if(t==='Run out'){ modal={type:'runOutDetail'}; render(); }
        else if(t==='Caught'){ modal={type:'caughtBy'}; render(); }
        else { recordWicket(t,'striker',0); }
      };
      m.appendChild(b);
    });
    const close = el('<button class="modal-close">Cancel</button>');
    close.onclick = ()=>{ modal=null; render(); };
    m.appendChild(close);
  }
  else if(modal.type==='caughtBy'){
    const inn = curInn();
    m.appendChild(el('<h3>Caught — who took the catch?</h3>'));
    m.appendChild(el('<p class="hint" style="margin-bottom:12px;">Select the fielder from the bowling side.</p>'));
    teamSquad(inn.bowlingTeam).forEach((name,idx)=>{
      const id = inn.bowlingTeam+'_'+idx;
      const isBowler = (id === inn.bowlerId);
      const label = name + (isBowler ? ' (bowler)' : '');
      const b = el(`<button class="list-btn">${label}</button>`);
      b.onclick = ()=>{
        const bwName = playerName(inn.bowlingTeam, inn.bowlerId);
        const dismissal = isBowler
          ? `c & b ${name}`
          : `c ${name} b ${bwName}`;
        recordWicket(dismissal,'striker',0);
      };
      m.appendChild(b);
    });
    const back = el('<button class="modal-close">← Back</button>');
    back.onclick = ()=>{ modal={type:'wicketType'}; render(); };
    m.appendChild(back);
  }
  else if(modal.type==='retiredModal'){
    const inn = curInn();
    const sName = strikerId(inn) ? playerName(inn.battingTeam, strikerId(inn)) : 'Striker';
    m.appendChild(el(`<h3>Retire batsman</h3>`));
    m.appendChild(el(`<p class="hint" style="margin-bottom:14px;">Retiring: <b>${sName}</b></p>`));
    const hurtBtn = el('<button class="list-btn">🤕 Retired Hurt <span style="float:right;font-weight:400;font-size:12px;color:var(--muted);">Not a wicket</span></button>');
    const outBtn  = el('<button class="list-btn">🚶 Retired Out <span style="float:right;font-weight:400;font-size:12px;color:var(--red);">Counts as wicket</span></button>');
    hurtBtn.onclick = ()=> recordRetired('hurt');
    outBtn.onclick  = ()=> recordRetired('out');
    m.appendChild(hurtBtn); m.appendChild(outBtn);
    const close = el('<button class="modal-close">Cancel</button>');
    close.onclick = ()=>{ modal=null; render(); };
    m.appendChild(close);
  }
  else if(modal.type==='runOutDetail'){
    const inn = curInn();
    m.appendChild(el('<h3>Run out — details</h3>'));
    m.appendChild(el('<label style="margin-top:0;">Runs completed before the run out</label>'));
    const grid = el('<div class="opt-grid" style="grid-template-columns:repeat(4,1fr);"></div>');
    let chosenRuns = 0;
    [0,1,2,3].forEach(r=>{
      const b = el(`<button class="opt-btn ${r===0?'sel':''}">${r}</button>`);
      b.onclick = ()=>{ grid.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); chosenRuns=r; };
      grid.appendChild(b);
    });
    m.appendChild(grid);
    m.appendChild(el('<label>Who was out?</label>'));
    const sBtn = el(`<button class="list-btn">${playerName(inn.battingTeam, strikerId(inn))} (striker)</button>`);
    const nBtn = el(`<button class="list-btn">${playerName(inn.battingTeam, nonStrikerId(inn))} (non-striker)</button>`);
    sBtn.onclick = ()=> recordWicket('Run out','striker',chosenRuns);
    nBtn.onclick = ()=> recordWicket('Run out','nonStriker',chosenRuns);
    m.appendChild(sBtn); m.appendChild(nBtn);
    const close = el('<button class="modal-close">Cancel</button>');
    close.onclick = ()=>{ modal=null; render(); };
    m.appendChild(close);
  }
  else if(modal.type==='newBatsman'){
    const inn = curInn();
    m.appendChild(el('<span class="modal-required-badge"></span>'));
    m.appendChild(el('<h3>Next batsman</h3>'));
    // exclude players already at the crease or permanently out; allow Retired Hurt back
    const atCrease = new Set([inn.creaseA, inn.creaseB].filter(Boolean));
    let hasAny = false;
    teamSquad(inn.battingTeam).forEach((name,idx)=>{
      const id = inn.battingTeam+'_'+idx;
      const stat = inn.batsStats[id];
      // skip: currently at crease
      if(atCrease.has(id)) return;
      // skip: already out (including Retired Out) but NOT Retired Hurt
      if(stat && stat.out) return;
      // skip: already batted and still at crease elsewhere (non-retired)
      if(stat && !stat.retired && !stat.out) return;
      const isRetiredHurt = stat && stat.retired && !stat.out;
      const label = isRetiredHurt ? `${name} <span style="color:var(--amber);font-size:12px;font-weight:400;">(Ret. Hurt — returning)</span>` : name;
      const b = el(`<button class="list-btn">${label}</button>`);
      b.onclick = ()=>{
        if(isRetiredHurt){
          // clear the retired flag so they're treated as a normal batsman again
          inn.batsStats[id].retired = false;
          inn.batsStats[id].outDesc = '';
        }
        finalizeNewBatsman(id);
      };
      m.appendChild(b);
      hasAny = true;
    });
    if(!hasAny) m.appendChild(el('<p class="hint">No more batsmen available.</p>'));
  }
  else if(modal.type==='newBowler'){
    const inn = curInn();
    m.appendChild(el('<span class="modal-required-badge"></span>'));
    m.appendChild(el('<h3>Select bowler for next over</h3>'));
    m.appendChild(el(`<p class="hint" style="margin-bottom:12px;">Previous bowler (${playerName(inn.bowlingTeam, inn.prevBowlerId)}) cannot bowl consecutive overs.</p>`));
    let added = false;
    teamSquad(inn.bowlingTeam).forEach((name,idx)=>{
      const id = inn.bowlingTeam+'_'+idx;
      if(id === inn.prevBowlerId) return;
      const b = el(`<button class="list-btn">${name}</button>`);
      b.onclick = ()=> finalizeNewBowler(id);
      m.appendChild(b);
      added = true;
    });
    if(!added){
      // All bowlers used — allow previous bowler as last resort
      const b = el(`<button class="list-btn">${playerName(inn.bowlingTeam, inn.prevBowlerId)} <span style="color:var(--amber);font-size:12px;">(only option)</span></button>`);
      b.onclick = ()=> finalizeNewBowler(inn.prevBowlerId);
      m.appendChild(b);
    }
  }
  else if(modal.type==='confirmEndInnings'){
    m.appendChild(el('<h3>End this innings now?</h3>'));
    m.appendChild(el('<p class="hint" style="margin-bottom:14px;">Use this if the team has declared or you need to stop early.</p>'));
    const yes = el('<button class="btn-primary" style="margin-top:0;">Yes, end innings</button>');
    yes.onclick = ()=>{
      const inn = curInn();
      inn.done = true;
      undoStack = []; // clear history so it can't leak into the next innings
      if(M.curInnIdx===0){ M.stage='between'; } else { M.stage='finished'; computeResult(); }
      modal=null; render();
    };
    const no = el('<button class="modal-close">Cancel</button>');
    no.onclick = ()=>{ modal=null; render(); };
    m.appendChild(yes); m.appendChild(no);
  }
  else if(modal.type==='squadEdit'){
    m.appendChild(el('<h3>Edit squads</h3>'));
    m.appendChild(el('<p class="hint" style="margin-bottom:14px;">Rename any player below. Stats already recorded stay attached to that player. Leave a box empty to fall back to the default name.</p>'));

    const inputsByTeam = {A:[], B:[]};
    ['A','B'].forEach(team=>{
      const sec = el(`<div class="card" style="padding:13px;"></div>`);
      sec.appendChild(el(`<div class="sectitle" style="margin:0 0 10px;">${M.teamNames[team]}</div>`));
      teamSquad(team).forEach((name,idx)=>{
        const row = el(`<div style="margin-bottom:8px;"></div>`);
        const inp = document.createElement('input');
        inp.type='text'; inp.value=name; inp.placeholder='Player '+(idx+1);
        inp.style.marginBottom='0';
        row.appendChild(inp);
        sec.appendChild(row);
        inputsByTeam[team].push(inp);
      });
      const resetBtn = el(`<button class="modal-close" style="margin-top:2px;">Reset ${M.teamNames[team]} to default names</button>`);
      resetBtn.onclick = ()=>{
        inputsByTeam[team].forEach((inp,idx)=>{ inp.value = 'Player '+(idx+1); });
      };
      sec.appendChild(resetBtn);
      m.appendChild(sec);
    });

    const save = el('<button class="btn-primary" style="margin-top:6px;">Save changes</button>');
    save.onclick = ()=>{
      ['A','B'].forEach(team=>{
        M.squads[team] = inputsByTeam[team].map((inp,idx)=> inp.value.trim() || ('Player '+(idx+1)));
      });
      modal=null; render();
    };
    const cancel = el('<button class="modal-close">Cancel</button>');
    cancel.onclick = ()=>{ modal=null; render(); };
    m.appendChild(save); m.appendChild(cancel);
  }
  else if(modal.type==='githubSync'){
    const cfg = loadGithubConfig() || {owner:'', repo:'', branch:'main', token:''};
    m.appendChild(el('<h3>☁️ GitHub Sync</h3>'));
    m.appendChild(el(`<p class="hint" style="margin-bottom:14px;">
      Squads and the player library get shared with anyone who opens this page's link, by storing them as JSON files in your repo.
      Reading works for everyone automatically. To let <b>this device</b> save changes back (squad edits, and pushing scorecard PDFs),
      enter a GitHub token below — it stays only in this browser and is never written into the app's source.
    </p>`));
    m.appendChild(el(`<div class="hint" style="background:rgba(212,255,79,0.08); border:1px solid rgba(212,255,79,0.25); border-radius:8px; padding:10px 12px; margin-bottom:14px; font-size:12px;">
      ⚠️ Use a <b>fine-grained</b> token (Settings → Developer settings → Fine-grained tokens) scoped to <b>only this one repo</b>,
      with <b>Contents: Read and write</b> permission, and an expiry date. Never use a classic all-repo token here, and never paste it anywhere public.
    </div>`));

    m.appendChild(el('<label>Repo owner (your GitHub username/org)</label>'));
    const ownerInp = el('<input type="text" placeholder="e.g. rajesh-k">'); ownerInp.value = cfg.owner;
    m.appendChild(ownerInp);

    m.appendChild(el('<label>Repository name</label>'));
    const repoInp = el('<input type="text" placeholder="e.g. RKCricScore">'); repoInp.value = cfg.repo;
    m.appendChild(repoInp);

    m.appendChild(el('<label>Branch</label>'));
    const branchInp = el('<input type="text" placeholder="main">'); branchInp.value = cfg.branch || 'main';
    m.appendChild(branchInp);

    m.appendChild(el('<label>Personal access token <span style="color:var(--mutedDark); text-transform:none; font-weight:400;">(leave blank to stay read-only on this device)</span></label>'));
    const tokenInp = el('<input type="password" placeholder="github_pat_...">'); tokenInp.value = cfg.token || '';
    m.appendChild(tokenInp);

    const statusMsg = el('<p class="hint" style="margin-top:10px; min-height:16px;"></p>');
    m.appendChild(statusMsg);

    const testBtn = el('<button class="btn-ghost" style="margin-top:4px;">Test connection</button>');
    testBtn.onclick = async ()=>{
      statusMsg.textContent = 'Testing…'; statusMsg.style.color='';
      const testCfg = { owner:ownerInp.value.trim(), repo:repoInp.value.trim(), branch:branchInp.value.trim()||'main', token:tokenInp.value.trim() };
      if(!testCfg.owner || !testCfg.repo){ statusMsg.textContent='Enter owner and repo name first.'; statusMsg.style.color='var(--red)'; return; }
      try{
        await githubGetFile(testCfg, GITHUB_SQUADS_PATH); // null (404) is fine — file may not exist yet
        statusMsg.textContent = testCfg.token ? '✅ Connected — this device can read and write.' : '✅ Repo reachable — read-only (no token entered).';
        statusMsg.style.color = 'var(--lime)';
      }catch(e){
        statusMsg.textContent = '❌ '+e.message+'. Check owner/repo/branch and that the repo is public (or your token has access).';
        statusMsg.style.color = 'var(--red)';
      }
    };
    m.appendChild(testBtn);

    const save = el('<button class="btn-primary" style="margin-top:10px;">Save settings</button>');
    save.onclick = ()=>{
      const owner = ownerInp.value.trim(), repo = repoInp.value.trim(), branch = branchInp.value.trim()||'main', token = tokenInp.value.trim();
      if(!owner || !repo){ statusMsg.textContent='Enter owner and repo name first.'; statusMsg.style.color='var(--red)'; return; }
      saveGithubConfig({owner, repo, branch, token});
      modal=null; render();
    };
    m.appendChild(save);

    if(cfg.owner || cfg.token){
      const clearBtn = el('<button class="modal-close" style="margin-top:8px; color:var(--red); border-color:var(--red);">Remove GitHub Sync from this device</button>');
      clearBtn.onclick = ()=>{ if(confirm('Stop syncing on this device? This only clears local settings — nothing is deleted from GitHub.')){ clearGithubConfig(); modal=null; render(); } };
      m.appendChild(clearBtn);
    }
    const close = el('<button class="modal-close" style="margin-top:8px;">Close</button>');
    close.onclick = ()=>{ modal=null; render(); };
    m.appendChild(close);
  }
  else if(modal.type==='scorecard'){
    m.appendChild(el('<h3>Full scorecard</h3>'));
    M.innings.forEach((inn,i)=>{
      m.appendChild(el(`<div class="sectitle" style="margin:14px 0 6px;">${M.teamNames[inn.battingTeam]} — ${inn.totalRuns}/${inn.totalWkts} (${oversStr(inn)} ov)</div>`));
      m.appendChild(renderBattingTable(inn));
      m.appendChild(el(`<div class="sectitle" style="margin:14px 0 6px;">Bowling — ${M.teamNames[inn.bowlingTeam]}</div>`));
      m.appendChild(renderBowlingTable(inn));
    });
    const close = el('<button class="modal-close">Close</button>');
    close.onclick = ()=>{ modal=null; render(); };
    m.appendChild(close);
    const pdfBtn = el('<button class="btn-pdf" style="margin-top:10px;">📄 Export as PDF</button>');
    pdfBtn.onclick = exportPDF;
    m.appendChild(pdfBtn);
  }
  return overlay;
}

function renderBattingTable(inn){
  let rows = '';
  Object.keys(inn.batsStats).forEach(id=>{
    const s = inn.batsStats[id];
    const name = playerName(inn.battingTeam, id);
    const status = s.out ? `<span class="out-tag">${s.outDesc}</span>` : `<span class="not-out">not out</span>`;
    rows += `<tr><td>${name}<br>${status}</td><td class="num">${s.runs}</td><td class="num">${s.balls}</td><td class="num">${s.fours}</td><td class="num">${s.sixes}</td><td class="num">${sr(s.runs,s.balls)}</td></tr>`;
  });
  return el(`<table><thead><tr><th>Batsman</th><th class="num">R</th><th class="num">B</th><th class="num">4s</th><th class="num">6s</th><th class="num">SR</th></tr></thead><tbody>${rows}</tbody></table>`);
}
function renderBowlingTable(inn){
  let rows = '';
  Object.keys(inn.bowlStats).forEach(id=>{
    const s = inn.bowlStats[id];
    const name = playerName(inn.bowlingTeam, id);
    const ov = Math.floor(s.balls/6)+'.'+(s.balls%6);
    rows += `<tr><td>${name}</td><td class="num">${ov}</td><td class="num">${s.runs}</td><td class="num">${s.wkts}</td><td class="num">${econ(s.runs,s.balls)}</td></tr>`;
  });
  return el(`<table><thead><tr><th>Bowler</th><th class="num">O</th><th class="num">R</th><th class="num">W</th><th class="num">Econ</th></tr></thead><tbody>${rows}</tbody></table>`);
}

render();

/* If GitHub Sync is configured, pull the latest shared squads/library
   once on load (read-only, works even without a token) and refresh the
   setup screen if we're sitting on it so the shared data shows up. */
if(githubCanRead()){
  pullSharedDataFromGithub().then(changed=>{
    if(changed && M.stage==='setup' && !showPlayerManager) render();
  });
}
</script>
</body>
</html>
