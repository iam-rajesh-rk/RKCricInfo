/* Generate a safe filename */
function scorecardFilename(){
  const d = new Date().toISOString().slice(0,10);
  return ('Cricket_'+M.teamNames.A+'_vs_'+M.teamNames.B+'_'+d+'.html').replace(/[^a-zA-Z0-9._-]/g,'_');
}

/* Detect iOS (incl. iPadOS, which reports as "MacIntel" but has touch support) */
function isIOSDevice(){
  const ua = navigator.userAgent || '';
  return /iPad|iPhone|iPod/.test(ua) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
}

/* Try to render the scorecard element to a real PDF Blob using html2pdf.js.
   Returns null (instead of throwing) if the library never loaded — e.g. no
   internet connection at the ground — so callers can fall back gracefully. */
async function renderScorecardToPDFBlob(element, filenameNoExt){
  if(typeof html2pdf === 'undefined') return null;
  const opts = {
    margin: 8,
    filename: filenameNoExt+'.pdf',
    image: { type:'jpeg', quality:0.95 },
    html2canvas: { scale:2, useCORS:true, backgroundColor:'#ffffff' },
    jsPDF: { unit:'mm', format:'a4', orientation:'portrait' },
    pagebreak: { mode:['avoid-all','css','legacy'] }
  };
  try{
    const blob = await html2pdf().set(opts).from(element).outputPdf('blob');
    return blob;
  }catch(e){
    return null;
  }
}

/* Hand a finished Blob to the user on non-iOS platforms (iOS is handled
   separately in exportPDF via a synchronously pre-opened tab — see there
   for why). Uses a plain <a download> link. */
function deliverFile(blob, fname, mime){
  const url = URL.createObjectURL(blob);
  try{
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 8000);
  }catch(e){
    // Last-resort fallback: just open it
    window.open(url, '_blank');
    setTimeout(()=> URL.revokeObjectURL(url), 30000);
  }
}

/* Best-effort, silent push of the final scorecard PDF into Firebase the
   moment a match finishes — only if this device is already Live-signed-in
   (i.e. the scorer opted into live sync). Builds the scorecard off-screen
   so it doesn't require the export overlay to be open. Never throws —
   if it fails (offline, not signed in, etc.) the scorer can still use the
   manual "Save scorecard to Firebase" button from the Scorecard screen.
   Guarded by M.firebaseScorecardId so this never creates a second,
   duplicate entry for the same match (e.g. if the scorer also taps the
   manual save button afterwards — that reuses this same id instead). */
async function autoPushFinishedScorecardToFirebase(){
  if(VIEW_MODE || M.firebaseScorecardId || !(window.LiveSync && window.LiveSync.isSignedIn())) return;
  const holder = document.createElement('div');
  holder.className = 'rk-pdf-source';
  // Kept within normal viewport coordinates (not thousands of pixels
  // off-screen) — html2canvas can fail to properly measure/capture
  // elements positioned far outside the viewport, silently producing a
  // blank page. opacity+pointer-events keeps it invisible and
  // non-interactive without moving it away from (0,0).
  holder.style.cssText = 'position:fixed; top:0; left:0; width:800px; opacity:0.01; pointer-events:none; z-index:-1;';
  try{
    holder.innerHTML = buildScorecardHTML();
    document.body.appendChild(holder);
    // Give the browser a couple of frames to actually commit layout/paint
    // for the freshly-inserted content before html2canvas captures it.
    await new Promise(r=> requestAnimationFrame(()=> requestAnimationFrame(r)));
    const baseName = scorecardFilename().replace(/\.html$/,'');
    const blob = await renderScorecardToPDFBlob(holder, baseName);
    // A real scorecard PDF (even a short one) is comfortably over this —
    // a suspiciously tiny file almost always means html2canvas captured
    // a blank/near-empty page. Skip uploading it rather than saving an
    // empty-looking entry; the manual "Save scorecard to Firebase"
    // button (run with the export overlay actually visible on-screen)
    // remains available to retry.
    if(!blob || blob.size < 3000) return;
    const id = await window.LiveSync.uploadScorecard(blob, baseName, {
      teamA: M.teamNames.A, teamB: M.teamNames.B,
      resultText: M.resultText||'', resultSub: M.resultSub||'',
      potm: M.awards && M.awards.potm ? `${M.awards.potm.name} (${M.teamNames[M.awards.potm.team]})` : ''
    });
    M.firebaseScorecardId = id;
    saveState();
  }catch(e){
    console.warn('Auto scorecard upload to Firebase failed:', e.message);
  }finally{
    holder.remove();
  }
}

/* Main export — generates a real PDF and hands it to the user via the Web
   Share API where available, falling back to a direct save/open. */
function exportPDF(){
  modal = null;
  render(); // close any modal before showing the overlay

  // Remove any stale overlay
  const old = document.getElementById('rk-print-overlay');
  if(old) old.remove();

  const overlay = document.createElement('div');
  overlay.id = 'rk-print-overlay';
  const closeOverlay = ()=>{ overlay.remove(); render(); };

  /* ── Share / Save as PDF button ── */
  const shareBtn = document.createElement('button');
  shareBtn.className = 'pr-print-btn';
  shareBtn.textContent = '📤 Share / Save as PDF';
  shareBtn.setAttribute('ontouchstart','');
  shareBtn.onclick = async ()=>{
    // CRITICAL for iOS Safari: window.open() and navigator.share() only work
    // when called synchronously inside a real user gesture. html2canvas/html2pdf
    // takes real time, so if we open the tab / call share AFTER awaiting the
    // PDF, Safari has already revoked the gesture and silently blocks both.
    // Fix: open a blank tab THIS INSTANT (still inside the click, before any
    // await) and just navigate it to the real file once it's ready.
    const preOpenedTab = isIOSDevice() ? window.open('', '_blank') : null;

    const originalLabel = shareBtn.textContent;
    shareBtn.disabled = true;
    shareBtn.textContent = '⏳ Preparing PDF…';

    const baseName = scorecardFilename().replace(/\.html$/,'');
    const previewEl = overlay.querySelector('.rk-pdf-source');

    let blob = await renderScorecardToPDFBlob(previewEl, baseName);
    let fname = baseName+'.pdf';
    let mime  = 'application/pdf';

    if(!blob){
      // Offline / library blocked — fall back to a standalone HTML file
      // so the scorecard can still be shared/saved.
      blob = new Blob([buildStandaloneFile()], {type:'text/html'});
      fname = baseName+'.html';
      mime  = 'text/html';
    }

    shareBtn.disabled = false;
    shareBtn.textContent = originalLabel;

    // ── iOS: navigate the pre-opened tab (never blocked, since the tab was
    // opened synchronously inside the tap). Safari shows the PDF in its
    // built-in viewer, from which the person taps the Share icon → Save to
    // Files / Save Image / send it on. This is the reliable iOS path —
    // navigator.share() after an async delay is too unreliable here.
    if(isIOSDevice()){
      const url = URL.createObjectURL(blob);
      if(preOpenedTab){
        preOpenedTab.location = url;
      } else {
        // Pop-ups are fully disabled in Safari settings — last resort.
        window.open(url, '_blank');
      }
      setTimeout(()=> URL.revokeObjectURL(url), 30000);
      closeOverlay();
      return;
    }

    // ① Web Share API with file (Android Chrome 86+, desktop where supported)
    if(navigator.share && navigator.canShare){
      const file = new File([blob], fname, {type:mime});
      if(navigator.canShare({files:[file]})){
        navigator.share({
          title:'RKCricScore Scorecard',
          text: M.teamNames.A+' vs '+M.teamNames.B,
          files:[file]
        }).then(()=>{ closeOverlay(); })
          .catch(err=>{ if(err.name!=='AbortError') deliverFile(blob, fname, mime); });
        return;
      }
    }
    // ② Platform-appropriate direct save/open
    deliverFile(blob, fname, mime);
  };
  overlay.appendChild(shareBtn);

  /* ── Save to GitHub (only meaningful if this device has a write token) ── */
  if(githubCanWrite()){
    const ghBtn = document.createElement('button');
    ghBtn.className = 'pr-print-btn';
    ghBtn.style.background = '#238636';
    ghBtn.textContent = '☁️ Save scorecard to GitHub';
    ghBtn.setAttribute('ontouchstart','');
    ghBtn.onclick = async ()=>{
      const originalLabel = ghBtn.textContent;
      ghBtn.disabled = true;
      ghBtn.textContent = '⏳ Pushing to GitHub…';
      try{
        const baseName = scorecardFilename().replace(/\.html$/,'');
        const previewEl = overlay.querySelector('.rk-pdf-source');
        const blob = await renderScorecardToPDFBlob(previewEl, baseName);
        if(!blob) throw new Error('Could not generate the PDF (no internet? html2pdf failed to load)');
        const path = await pushScorecardToGithub(blob, baseName);
        ghBtn.textContent = '✅ Saved to '+path;
      }catch(e){
        ghBtn.textContent = '❌ '+e.message;
        ghBtn.disabled = false;
        setTimeout(()=>{ ghBtn.textContent = originalLabel; }, 4000);
      }
    };
    overlay.appendChild(ghBtn);
  } else {
    const ghHint = document.createElement('p');
    ghHint.style.cssText = 'font-size:11px; color:#888; text-align:center; margin:0 0 8px;';
    ghHint.textContent = 'Tip: set up ☁️ GitHub Sync (top bar) to push this scorecard straight into your repo.';
    overlay.appendChild(ghHint);
  }

  /* ── Save to Firebase (only meaningful if this device is Live-signed-in) ── */
  if(window.LiveSync && window.LiveSync.isSignedIn()){
    const fbBtn = document.createElement('button');
    fbBtn.className = 'pr-print-btn';
    fbBtn.style.background = '#FFB23F'; fbBtn.style.color = '#111';
    fbBtn.textContent = M.firebaseScorecardId ? '🔥 Re-save to Firebase (already saved once)' : '🔥 Save scorecard to Firebase';
    fbBtn.setAttribute('ontouchstart','');
    fbBtn.onclick = async ()=>{
      const originalLabel = fbBtn.textContent;
      fbBtn.disabled = true;
      fbBtn.textContent = '⏳ Uploading…';
      try{
        const baseName = scorecardFilename().replace(/\.html$/,'');
        const previewEl = overlay.querySelector('.rk-pdf-source');
        const blob = await renderScorecardToPDFBlob(previewEl, baseName);
        if(!blob || blob.size < 3000) throw new Error('Could not generate the PDF (no internet? html2pdf failed to load, or the preview was blank)');
        // Reuse the existing id if this match was already auto-saved (or
        // saved once before), so this overwrites that same entry instead
        // of creating a duplicate "empty-looking" second one in the list.
        const id = await window.LiveSync.uploadScorecard(blob, baseName, {
          teamA: M.teamNames.A, teamB: M.teamNames.B,
          resultText: M.resultText||'', resultSub: M.resultSub||'',
          potm: M.awards && M.awards.potm ? `${M.awards.potm.name} (${M.teamNames[M.awards.potm.team]})` : ''
        }, M.firebaseScorecardId);
        M.firebaseScorecardId = id;
        saveState();
        fbBtn.textContent = '✅ Saved to Firebase';
        setTimeout(()=>{ fbBtn.textContent = '🔥 Re-save to Firebase (already saved once)'; fbBtn.disabled = false; }, 2500);
      }catch(e){
        fbBtn.textContent = '❌ '+e.message;
        fbBtn.disabled = false;
        setTimeout(()=>{ fbBtn.textContent = originalLabel; }, 4000);
      }
    };
    overlay.appendChild(fbBtn);
  } else {
    const fbHint = document.createElement('p');
    fbHint.style.cssText = 'font-size:11px; color:#888; text-align:center; margin:0 0 8px;';
    fbHint.textContent = 'Tip: turn on 🟢 Live (top bar, with the PIN) to push this scorecard straight into Firebase.';
    overlay.appendChild(fbHint);
  }

  /* ── Close ── */
  const closeBtn = document.createElement('button');
  closeBtn.className = 'pr-close-btn';
  closeBtn.textContent = '✕ Close preview';
  closeBtn.setAttribute('ontouchstart','');
  closeBtn.onclick = closeOverlay;
  overlay.appendChild(closeBtn);

  /* ── Scorecard preview (also the source element rendered into the PDF) ── */
  const content = document.createElement('div');
  content.className = 'rk-pdf-source';
  content.innerHTML = buildScorecardHTML();
  overlay.appendChild(content);

  document.body.appendChild(overlay);
  requestAnimationFrame(()=> overlay.classList.add('rk-visible'));
  overlay.scrollTop = 0;
}


/* ============== RENDER ============== */
function el(html){ const d=document.createElement('div'); d.innerHTML=html; return d.firstElementChild; }

function render(){
  if(VIEW_MODE) return renderViewerMode();
  saveState();
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderTopbar());
  let body;
  if(showPlayerManager) body = renderPlayerManagerScreen();
  else if(M.stage==='setup') body = renderSetupScreen();
  else if(M.stage==='toss') body = renderTossScreen();
  else if(M.stage==='openers') body = renderOpenersScreen();
  else if(M.stage==='playing') body = renderPlayingScreen();
  else if(M.stage==='between') body = renderBetweenScreen();
  else if(M.stage==='finished') body = renderFinishedScreen();
  app.appendChild(body);
  if(modal) app.appendChild(renderModal());
}

/* ============== READ-ONLY LIVE VIEWER (?view=1) ==============
   No scoring controls at all — just watches Firebase and redraws the
   scoreboard whenever the scorer's device pushes an update. Reuses the
   existing .scoreboard / .sb-* CSS classes already defined at the top
   of the file, so it visually matches the rest of the app. */
let liveViewerSubscribed = false;
let viewerShowScorecards = false;   // toggles viewer between live score and past-PDFs list
let viewerScorecards = null;        // cached list once fetched
let viewerScorecardsLoading = false;
function renderViewerMode(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  const bar = el(`<div class="topbar">
    <div class="brand"><div class="dot"></div><div><span>RKCricScore</span><small>Live</small></div></div>
    <div style="display:flex; gap:8px;"></div>
  </div>`);
  app.appendChild(bar);
  const btnWrap = bar.querySelector('div[style]');
  const toggleBtn = document.createElement('button'); toggleBtn.className='iconbtn';
  toggleBtn.textContent = viewerShowScorecards ? '🏏 Live score' : '📁 Scorecards';
  toggleBtn.onclick = ()=>{
    viewerShowScorecards = !viewerShowScorecards;
    if(viewerShowScorecards && !viewerScorecards && window.LiveSync){
      viewerScorecardsLoading = true;
      window.LiveSync.listScorecards().then(items=>{
        viewerScorecards = items; viewerScorecardsLoading = false; renderViewerMode();
      });
    }
    renderViewerMode();
  };
  btnWrap.appendChild(toggleBtn);

  if(!liveViewerSubscribed && window.LiveSync){
    liveViewerSubscribed = true;
    window.LiveSync.subscribe((state)=>{ liveViewState = state ? normalizeMatch(state) : state; if(!viewerShowScorecards) renderViewerMode(); });
  }

  if(viewerShowScorecards){
    const wrap = el('<div class="wrap"></div>');
    wrap.appendChild(el('<h2 style="font-size:19px; margin-bottom:10px;">Saved scorecards</h2>'));
    if(viewerScorecardsLoading){
      wrap.appendChild(el('<p class="hint">Loading…</p>'));
    } else if(!viewerScorecards || viewerScorecards.length===0){
      wrap.appendChild(el('<p class="hint">No scorecards uploaded yet.</p>'));
    } else {
      viewerScorecards.forEach(item=>{
        const when = item.savedAt ? new Date(item.savedAt).toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
        const teamLine = (item.teamA||'Team A')+' vs '+(item.teamB||'Team B');
        const row = el(`<div class="card" style="padding:12px 14px; margin-bottom:10px;">
          <div style="font-weight:600;">${teamLine}</div>
          ${item.resultText ? `<div class="hint" style="margin:2px 0 0;">${item.resultText}</div>` : ''}
          ${item.potm ? `<div class="hint" style="margin:2px 0 0;">🏆 ${item.potm}</div>` : ''}
          <div class="hint" style="margin-top:4px;">${when}</div>
        </div>`);
        const dl = el('<button class="btn-ghost" style="display:block; width:100%; text-align:center; margin-top:8px;">⬇️ Open / Download PDF</button>');
        dl.onclick = ()=> openScorecardPdf(item.id, dl);
        row.appendChild(dl);
        wrap.appendChild(row);
      });
    }
    app.appendChild(wrap);
    return;
  }

  if(!liveViewState){
    app.appendChild(el(`<div class="wrap"><p class="hint">Waiting for live score…</p></div>`));
    return;
  }

  const vm = liveViewState;
  const inn = vm.innings && vm.innings[vm.curInnIdx];
  if(!inn){
    app.appendChild(el(`<div class="wrap"><p class="hint">Match hasn't started yet.</p></div>`));
    return;
  }
  const sb = el(`<div class="scoreboard">
    <div class="sb-top">
      <div class="sb-team">${vm.teamNames[inn.battingTeam]}</div>
      <div class="sb-innlabel">Inns ${vm.curInnIdx+1}</div>
    </div>
    <div class="sb-score">
      <h2 style="font-size:40px;">${inn.totalRuns}/${inn.totalWkts}</h2>
      <span style="color:var(--muted); font-size:16px;">(${oversStr(inn)} ov)</span>
    </div>
    <div class="sb-overs">Overs ${oversStr(inn)} of ${oversForInnings(vm.curInnIdx)} · CRR ${crr(inn)}</div>
    ${inn.target!==null ? `<div class="sb-target">Target ${inn.target} · need ${Math.max(inn.target-inn.totalRuns,0)} runs · RRR ${rrr(inn)}</div>` : ''}
  </div>`);
  app.appendChild(sb);
  if(vm.resultText){
    app.appendChild(el(`<div class="wrap"><div class="card"><b>${vm.resultText}</b><div class="hint">${vm.resultSub||''}</div></div></div>`));
    if(vm.awards){
      const a = vm.awards;
      const wrap = el('<div class="wrap" style="padding-top:0;"></div>');
      const card = el('<div class="awards-block"></div>');
      const row = (label, val)=> el(`<div class="award-row"><span class="award-label">${label}</span><span class="award-val">${val}</span></div>`);
      card.appendChild(row('🏆 Player of the Match', a.potm ? `${a.potm.name} (${vm.teamNames[a.potm.team]})` : '—'));
      card.appendChild(row('🏏 Best Batsman', a.bestBatsman ? `${a.bestBatsman.name} (${vm.teamNames[a.bestBatsman.team]}) — ${a.bestBatsman.runs} (${a.bestBatsman.balls}b)` : '—'));
      card.appendChild(row('🎯 Best Bowler', a.bestBowler ? `${a.bestBowler.name} (${vm.teamNames[a.bestBowler.team]}) — ${a.bestBowler.wkts}/${a.bestBowler.runs}` : '—'));
      const fielderLine = formatFielderAward(a.bestFielder, vm.teamNames);
      if(fielderLine) card.appendChild(row('🧤 Best Fielder', fielderLine));
      wrap.appendChild(card);
      app.appendChild(wrap);
    }
  }
}

  const pdfs = document.createElement('button'); pdfs.className='iconbtn'; pdfs.textContent='📁 PDFs';
  pdfs.onclick=()=>{modal={type:'firebaseScorecards', loading:true, items:[]}; render(); loadFirebaseScorecardsIntoModal();};
  btnWrap.appendChild(pdfs);

  // Recovery: pull the last couple of *distinct matches* back down from
  // Firebase (each one's latest known score), so if sync drops mid-match
  // (e.g. lost the 2nd innings) the scorer can clearly pick which match
  // to resume — instead of loading the wrong game by mistake.
  const rec = document.createElement('button'); rec.className='iconbtn'; rec.textContent='⏮ Recover';
  rec.onclick=()=>{modal={type:'recoverMatches', loading:true, items:[]}; render(); loadRecentMatchesIntoModal();};

  live.onclick = ()=>{

      return;
    }
    // An in-app modal instead of the native prompt() — mobile Chrome
    // (iOS and Android) is inconsistent about showing/allowing prompt()
    // dialogs, which made "Live" silently do nothing on some phones even
    // though the exact same tap worked fine in Edge/desktop.
    modal = {type:'livePinEntry'};
    render();
  };
  btnWrap.appendChild(live);
  return bar;
}

/* Races a promise against a timeout so a hung Firebase call (e.g. a
   genuinely offline device) can never leave the UI stuck showing
   "nothing happened" forever — always settles one way or another. */
function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_, reject)=> setTimeout(()=> reject(new Error('Timed out — check your internet connection')), ms))
  ]);
}

/* Shared PIN-sign-in flow, used by the "🔒 Live off" modal. Updates
   `setStatus` with progress as it goes (so it's never silently stuck),
   and on success either loads a match already live elsewhere (via a
   modal confirm, not native confirm()) or just closes out. */
async function connectLiveWithPin(pin, setStatus){
  setStatus('⏳ Checking PIN…');
  const result = await withTimeout(window.LiveSync.signIn(pin), 15000);
  if(!result.ok){
    const friendly = {
      'auth/wrong-password': 'Wrong PIN.',
      'auth/invalid-credential': 'Wrong PIN.',
      'auth/user-not-found': 'No scorer account exists yet for this email — check Firebase Console → Authentication → Users.',
      'auth/too-many-requests': 'Too many attempts — Firebase has temporarily blocked sign-in. Wait a few minutes and try again.',
      'auth/network-request-failed': 'Network request failed — check your internet connection (or a firewall/VDI network policy blocking Firebase).',
      'auth/operation-not-allowed': 'Email/Password sign-in isn\'t enabled for this project — check Firebase Console → Authentication → Sign-in method.'
    }[result.code];
    throw new Error(friendly || ('Sign-in failed: '+(result.code || result.message)));
  }

  setStatus('⏳ Fetching squads…');
  await withTimeout(Promise.all([ pullFirebaseSquadsNow(), pullFirebaseLibraryNow() ]), 15000);

  setStatus('⏳ Checking for a live match…');
  const remote = await withTimeout(window.LiveSync.pullOnce(), 15000);
  if(remote && remote.teamNames){
    const localInProgress = M.stage!=='setup';
    if(localInProgress){
      // Ask via a modal (not native confirm()) for the same cross-browser
      // reliability reason as the PIN entry above.
      modal = {type:'liveTakeoverConfirm', remote};
      render();
      return;
    }
    M = normalizeMatch(remote);
    undoStack = [];
  }
  modal = null;
  render();
}

/* Fetches the list of uploaded scorecard PDFs from Firebase in the
   background and refreshes the modal once they arrive. Safe to call
   even if the modal gets closed/changed before the fetch finishes. */
async function loadFirebaseScorecardsIntoModal(){
  if(!window.LiveSync){ 
    if(modal && modal.type==='firebaseScorecards'){ modal.loading=false; modal.error='Live sync is still loading — try again in a second.'; render(); }
    return;
  }
  const items = await window.LiveSync.listScorecards();
  if(modal && modal.type==='firebaseScorecards'){
    modal.loading = false;
    modal.items = items;
    render();
  }
}

/* Fetches the last couple of distinct live-scored matches (each one's
   latest known state, keyed by matchId — see RECENT_MATCHES_PATH in the
   LiveSync module) from Firebase in the background and refreshes the
   "⏮ Recover" modal once they arrive. Same pattern as
   loadFirebaseScorecardsIntoModal() above — safe to call even if the
   modal gets closed/changed before the fetch finishes. */
async function loadRecentMatchesIntoModal(){
  if(!window.LiveSync){
    if(modal && modal.type==='recoverMatches'){ modal.loading=false; modal.error='Live sync is still loading — try again in a second.'; render(); }
    return;
  }
  const items = await window.LiveSync.listRecentMatches();
  if(modal && modal.type==='recoverMatches'){
    modal.loading = false;
    // Newest first — the current/most recent match, then the one before
    // it. Only 2 are ever stored server-side, but slice defensively.
    modal.items = items.slice(0, 2);
    render();
  }
}

/* Loads one match's saved state onto this device and resumes scoring
   from it — used by the "⏮ Recover" modal. Destructive to whatever match
   is currently in progress on this device, so the caller confirms first. */
function loadRecentMatch(item){
  backupCurrentMatchBeforeRecover();
  M = normalizeMatch(item.state);
  undoStack = [];
  modal = null;
  render();
}

/* Restores the match that was on this device right before the last
   "⏮ Recover" load — the one-step-back companion to loadRecentMatch()
   above. Backs up the (now current, recovered) match first too, so
   switching back and forth stays reversible either way. */
function restoreRecoverBackup(){
  const backup = readRecoverBackup();
  if(!backup) return;
  backupCurrentMatchBeforeRecover();
  M = normalizeMatch(backup.M);
  undoStack = backup.undoStack || [];
  modal = null;
  render();
}

/* Short one-line summary of a match's current score/stage, used in the
   "⏮ Recover" modal to tell two matches apart at a glance without
   needing to open either one first. */
function summarizeMatchState(state){
  if(!state || state.stage==='setup' || !Array.isArray(state.innings) || !state.innings.length){
    return 'Not yet started';
  }
  const inn = state.innings[state.innings.length-1];
  if(!inn) return '';
  const battingName = (state.teamNames && state.teamNames[inn.battingTeam]) || 'Batting team';
  const scoreLine = battingName+' '+(inn.totalRuns||0)+'/'+(inn.totalWkts||0)+' ('+oversStr(inn)+' ov)';
  const stageLine = state.stage==='finished'
    ? (state.resultText || 'Match finished')
    : (state.innings.length>1 ? '2nd innings in progress' : '1st innings in progress');
  return scoreLine+' — '+stageLine;
}

/* Fetches one scorecard's PDF bytes from Firebase on demand (they're
   stored as base64 in the Realtime Database, not Cloud Storage — see the
   LiveSync module for why) and opens it in a new tab via a blob URL.
   Shared by both the in-app "📁 PDFs" modal and the viewer's scorecards
   list, since both just need a button that fetches-then-opens by id. */
async function openScorecardPdf(id, btn){
  const original = btn.textContent;
  btn.disabled = true; btn.textContent = '⏳ Loading…';
  try{
    const blob = await window.LiveSync.downloadScorecard(id);
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    // Objects URLs are cheap to leak short-term, but clean up anyway once
    // the new tab/viewer has had time to actually load it.
    setTimeout(()=> URL.revokeObjectURL(url), 60000);
  }catch(e){
    btn.textContent = '❌ '+e.message;
    setTimeout(()=>{ btn.textContent = original; }, 3000);
  }finally{
    btn.disabled = false;
    if(btn.textContent === '⏳ Loading…') btn.textContent = original;
  }
}

  saveBtn.onclick = ()=>{
    const name = nameInput.value.trim() || 'Unnamed squad';
    const players = parsePlayers(playersArea.value);
    const list = loadPlayerLibrary();
    if(edit.id){
      const idx = list.findIndex(s=>s.id===edit.id);
      if(idx>-1){ list[idx].name=name; list[idx].players=players; }
    } else {
      list.push({ id:'sq_'+Date.now(), name, players });
    }
    savePlayerLibrary(list);
    pushLibraryToGithub();
    if(window.LiveSync) window.LiveSync.pushLibrary(list);
    playerManagerEdit = null;
    render();
  };
  const cancelBtn = el('<button class="btn-ghost" style="margin-top:10px;">Cancel</button>');
  cancelBtn.onclick = ()=>{ playerManagerEdit = null; render(); };
  card.appendChild(saveBtn); card.appendChild(cancelBtn);
  return card;
}

  const preB = saved ? saved.teamNames.B : 'Team B';
  const preAP = saved ? saved.squads.A.join('\n') : '';
  const preBP = saved ? saved.squads.B.join('\n') : '';

  const wrap = el(`<div class="wrap">
    <h2 style="font-size:21px; margin-bottom:2px;">New match</h2>
    <p class="hint" style="margin-bottom:10px;">Enter squad details below. Toss will be conducted next.</p>

    ${saved ? `<div style="background:rgba(212,255,79,0.08); border:1px solid rgba(212,255,79,0.25); border-radius:10px; padding:11px 13px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between;">
      <span style="font-size:13px; color:var(--lime); font-weight:600;">⚡ Pre-saved squads loaded</span>
      <button id="clearSquadBtn" style="background:transparent;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;">Clear saved</button>
    </div>` : ''}

    ${lib.length ? `<select id="loadSquadA" style="margin-bottom:8px;">${libOptions}</select>` : ''}
    <label>Team A players <span style="color:var(--mutedDark); text-transform:none; font-weight:400;">(one per line or comma-separated)</span></label>
    <textarea id="teamAPlayers" placeholder="Leave blank for Player 1–11" style="min-height:90px;">${preAP}</textarea>

    <label>Team B name</label>
    <input type="text" id="teamBName" placeholder="Team B" value="${preB}">
    ${lib.length ? `<select id="loadSquadB" style="margin-bottom:8px;">${libOptions}</select>` : ''}
    <label>Team B players</label>
    <textarea id="teamBPlayers" placeholder="Leave blank for Player 1–11" style="min-height:90px;">${preBP}</textarea>

    <label>Overs — Innings 1</label>
    <input type="number" id="oversLimit1" value="20" min="1" max="50">
    <label>Overs — Innings 2 <span style="color:var(--mutedDark); text-transform:none; font-weight:400;">(only change if different, e.g. rain-reduced overs)</span></label>
    <input type="number" id="oversLimit2" value="20" min="1" max="50">

    <div style="display:flex; align-items:center; gap:9px; margin-top:16px; padding:12px 13px; background:var(--surface2); border:1px solid var(--border); border-radius:10px;">
      <input type="checkbox" id="saveSquadChk" checked>
      <label for="saveSquadChk" style="margin:0; text-transform:none; letter-spacing:0; font-size:16px; font-weight:500; cursor:pointer; color:var(--text);">Remember these squads for next match</label>
    </div>
    <p class="hint" style="margin-top:8px;">
      ${(window.LiveSync && window.LiveSync.isSignedIn())
        ? '🟢 Signed in — saving will also sync these squads live for anyone opening this page\'s link.'
        : '🔒 Turn on Live (top bar, with the PIN) before saving to also sync these squads for everyone else opening the link — otherwise they\'re only remembered on this device.'}
    </p>
    <button class="btn-ghost" id="saveSquadNowBtn" style="margin-top:8px;">☁️ Save squad now (no need to start the match)</button>

    <button class="btn-primary" id="startBtn" style="margin-top:18px;">Continue to toss ›</button>
  </div>`);

  wrap.querySelector('#manageplayersBtn').onclick = ()=>{
    showPlayerManager=true; playerManagerEdit=null; render();
    // Refresh from Firebase every time this screen opens, so a squad
    // saved on another device (while this one was on a different screen)
    // shows up without needing a full page reload.
    if(window.LiveSync){
      window.LiveSync.pullLibraryOnce().then(remote=>{
        if(Array.isArray(remote)){ savePlayerLibrary(remote); if(showPlayerManager) render(); }
      });
    }
  };

  wrap.querySelector('#saveSquadNowBtn').onclick = async ()=>{
    const btn = wrap.querySelector('#saveSquadNowBtn');
    const original = btn.textContent;
    const an = wrap.querySelector('#teamAName').value.trim() || 'Team A';
    const bn = wrap.querySelector('#teamBName').value.trim() || 'Team B';
    const ap = parsePlayers(wrap.querySelector('#teamAPlayers').value);
    const bp = parsePlayers(wrap.querySelector('#teamBPlayers').value);
    saveSquads({A:an,B:bn},{A:ap,B:bp});
    if(window.LiveSync && window.LiveSync.isSignedIn()){
      btn.disabled = true; btn.textContent = '⏳ Saving…';
      try{
        await window.LiveSync.pushSquadsNow({teamNames:{A:an,B:bn}, squads:{A:ap,B:bp}});
        btn.textContent = '✅ Saved — synced for everyone with the link';
      }catch(e){
        btn.textContent = '❌ '+e.message;
      }
      btn.disabled = false;
    } else {
      btn.textContent = '💾 Saved on this device (turn on Live to sync for everyone)';
    }
    setTimeout(()=>{ btn.textContent = original; }, 3000);
  };

  if(saved) wrap.querySelector('#clearSquadBtn').onclick = ()=>{ clearSavedSquads(); render(); };

  // Squad-library loaders: fill name + players from a saved squad.
  // Always overwrite the name too — picking a squad from this dropdown is
  // an explicit choice, so it shouldn't be silently skipped just because
  // the name field already had something else in it (e.g. pre-filled from
  // a previous match or a live sync from another device).
  const loadSquadA = wrap.querySelector('#loadSquadA');
  const loadSquadB = wrap.querySelector('#loadSquadB');
  // Disables whichever squad is picked on one side from being pickable on
  // the other side too — two teams shouldn't both be the same saved squad.
  function syncSquadDropdownExclusion(){
    if(!loadSquadA || !loadSquadB) return;
    Array.from(loadSquadB.options).forEach(opt=>{
      opt.disabled = !!opt.value && opt.value === loadSquadA.value;
    });
    Array.from(loadSquadA.options).forEach(opt=>{
      opt.disabled = !!opt.value && opt.value === loadSquadB.value;
    });
  }
  if(loadSquadA) loadSquadA.onchange = (e)=>{
    const sq = lib.find(s=>s.id===e.target.value);
    if(sq){
      wrap.querySelector('#teamAPlayers').value = sq.players.join('\n');
      wrap.querySelector('#teamAName').value = sq.name;
    }
    syncSquadDropdownExclusion();
  };
  if(loadSquadB) loadSquadB.onchange = (e)=>{
    const sq = lib.find(s=>s.id===e.target.value);
    if(sq){
      wrap.querySelector('#teamBPlayers').value = sq.players.join('\n');
      wrap.querySelector('#teamBName').value = sq.name;
    }
    syncSquadDropdownExclusion();
  };
  syncSquadDropdownExclusion(); // in case pre-saved squads happened to match on load


  // Keep Innings-2 overs in sync with Innings-1 until the user edits it directly
  const ov1 = wrap.querySelector('#oversLimit1'), ov2 = wrap.querySelector('#oversLimit2');
  let ov2Touched = false;
  ov1.addEventListener('input', ()=>{ if(!ov2Touched) ov2.value = ov1.value; });
  ov2.addEventListener('input', ()=>{ ov2Touched = true; });
  wrap.querySelector('#startBtn').onclick = startMatchFromForm;
  return wrap;
}

function renderTossScreen(){
  const t = M.toss;
  const nameA = M.teamNames.A, nameB = M.teamNames.B;

  if(tossFlipping) return renderCoinFlipAnimation();

  if(!t.winner){
    if(tossManualMode) return renderManualTossPicker(nameA, nameB);

    // Step 1: pick calling team + call
    const wrap = el(`<div class="wrap">
      <h2 style="font-size:21px; margin-bottom:4px;">Toss</h2>
      <p class="hint" style="margin-bottom:18px;">Who calls the toss?</p>
    </div>`);

    let callingTeam = null, call = null;

    // team selector
    const teamRow = el('<div class="row2" style="margin-bottom:14px;"></div>');
    const btnA = el(`<button class="opt-btn" style="font-size:14px; padding:18px 0;">${nameA}</button>`);
    const btnB = el(`<button class="opt-btn" style="font-size:14px; padding:18px 0;">${nameB}</button>`);
    btnA.onclick = ()=>{ callingTeam='A'; btnA.classList.add('sel'); btnB.classList.remove('sel'); updateFlip(); };
    btnB.onclick = ()=>{ callingTeam='B'; btnB.classList.add('sel'); btnA.classList.remove('sel'); updateFlip(); };
    teamRow.appendChild(btnA); teamRow.appendChild(btnB);
    wrap.appendChild(teamRow);

    wrap.appendChild(el('<p class="hint" style="margin-bottom:10px;">Their call:</p>'));
    const callRow = el('<div class="row2" style="margin-bottom:22px;"></div>');
    const headBtn = el('<button class="opt-btn" style="font-size:20px; padding:16px 0;">🪙 Heads</button>');
    const tailBtn = el('<button class="opt-btn" style="font-size:20px; padding:16px 0;">🪙 Tails</button>');
    headBtn.onclick = ()=>{ call='heads'; headBtn.classList.add('sel'); tailBtn.classList.remove('sel'); updateFlip(); };
    tailBtn.onclick = ()=>{ call='tails'; tailBtn.classList.add('sel'); headBtn.classList.remove('sel'); updateFlip(); };
    callRow.appendChild(headBtn); callRow.appendChild(tailBtn);
    wrap.appendChild(callRow);

    const flipBtn = el('<button class="btn-primary" disabled style="opacity:0.4;">🪙 Flip coin</button>');
    function updateFlip(){ flipBtn.disabled=!(callingTeam&&call); flipBtn.style.opacity=flipBtn.disabled?'0.4':'1'; }
    flipBtn.onclick = ()=>{
      if(flipBtn.disabled) return;
      tossFlipping = true;
      tossFlipCallingTeam = callingTeam;
      tossFlipCall = call;
      render();
      // Actual result is decided the same way as before (Math.random) —
      // this timeout just holds it back until the spin animation (1.8s,
      // matching the CSS keyframes) has finished playing.
      setTimeout(()=>{
        tossFlipping = false;
        doToss(tossFlipCallingTeam, tossFlipCall);
      }, 1800);
    };
    wrap.appendChild(flipBtn);

    const manualBtn = el('<button class="btn-ghost" style="margin-top:10px;">🎯 Skip the flip — set result manually</button>');
    manualBtn.onclick = ()=>{ tossManualMode = true; render(); };
    wrap.appendChild(manualBtn);
    return wrap;
  }

  // Step 2: show result + winner chooses bat/field
  const won = t.winner;
  const wonName = won==='A' ? nameA : nameB;
  const isManual = t.call==='manual';
  const callerName = t.callingTeam==='A' ? nameA : nameB;

  const wrap = el(`<div class="wrap">
    <h2 style="font-size:21px; margin-bottom:18px;">Toss result</h2>

    <div style="text-align:center; padding:24px 18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:20px;">
      <div style="font-size:44px; margin-bottom:10px;">🪙</div>
      ${isManual
        ? `<div style="font-family:'Oswald',sans-serif; font-size:15px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px;">Toss set manually</div>`
        : `<div style="font-family:'Oswald',sans-serif; font-size:15px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px;">
             ${callerName} called <b style="color:var(--text);">${t.call}</b> — coin showed <b style="color:var(--text);">${t.result}</b>
           </div>`}
      <div style="font-family:'Oswald',sans-serif; font-size:26px; color:var(--lime); margin-top:10px;">${wonName} won the toss!</div>
    </div>

    <p class="hint" style="margin-bottom:12px; font-size:13.5px;">${wonName} choose to:</p>
    <div class="row2">
      <button class="opt-btn" id="chooseBat" style="font-size:15px; padding:20px 0;">🏏 Bat first</button>
      <button class="opt-btn" id="chooseField" style="font-size:15px; padding:20px 0;">🧤 Field first</button>
    </div>
  </div>`);
  wrap.querySelector('#chooseBat').onclick   = ()=> confirmTossChoice('bat');
  wrap.querySelector('#chooseField').onclick = ()=> confirmTossChoice('field');

  const redoBtn = el('<button class="btn-ghost" style="margin-top:14px; color:var(--muted); border-color:var(--border);">🔄 Redo toss</button>');
  redoBtn.onclick = ()=>{
    M.toss = { callingTeam:null, call:null, result:null, winner:null, choice:null };
    tossManualMode = false;
    render();
  };
  wrap.appendChild(redoBtn);
  return wrap;
}

/* Shown for ~1.8s right after tapping "Flip coin", before the real
   (already-decided) result is revealed. Purely a suspense animation —
   the actual toss outcome is still decided by Math.random() in doToss(),
   this just holds the reveal back until the CSS spin finishes. */
function renderCoinFlipAnimation(){
  const callerName = tossFlipCallingTeam==='A' ? M.teamNames.A : M.teamNames.B;
  return el(`<div class="wrap">
    <h2 style="font-size:21px; margin-bottom:4px;">Toss</h2>
    <div class="coin-flip-stage">
      <div class="coin-scene">
        <div class="coin">
          <div class="coin-face front">H</div>
          <div class="coin-face back">T</div>
        </div>
      </div>
      <div class="coin-flip-caption">${callerName} called <b>${tossFlipCall}</b><br>Flipping…</div>
    </div>
  </div>`);
}

function renderManualTossPicker(nameA, nameB){
  const wrap = el(`<div class="wrap">
    <h2 style="font-size:21px; margin-bottom:4px;">Set toss manually</h2>
    <p class="hint" style="margin-bottom:18px;">Pick the winner and their decision directly — no coin needed.</p>
  </div>`);

  let winner = null, choice = null;

  wrap.appendChild(el('<p class="hint" style="margin-bottom:10px;">Who won the toss?</p>'));
  const teamRow = el('<div class="row2" style="margin-bottom:18px;"></div>');
  const btnA = el(`<button class="opt-btn" style="font-size:14px; padding:18px 0;">${nameA}</button>`);
  const btnB = el(`<button class="opt-btn" style="font-size:14px; padding:18px 0;">${nameB}</button>`);
  btnA.onclick = ()=>{ winner='A'; btnA.classList.add('sel'); btnB.classList.remove('sel'); updateConfirm(); };
  btnB.onclick = ()=>{ winner='B'; btnB.classList.add('sel'); btnA.classList.remove('sel'); updateConfirm(); };
  teamRow.appendChild(btnA); teamRow.appendChild(btnB);
  wrap.appendChild(teamRow);

  wrap.appendChild(el('<p class="hint" style="margin-bottom:10px;">They chose to:</p>'));
  const choiceRow = el('<div class="row2" style="margin-bottom:22px;"></div>');
  const batBtn = el('<button class="opt-btn" style="font-size:15px; padding:18px 0;">🏏 Bat first</button>');
  const fieldBtn = el('<button class="opt-btn" style="font-size:15px; padding:18px 0;">🧤 Field first</button>');
  batBtn.onclick = ()=>{ choice='bat'; batBtn.classList.add('sel'); fieldBtn.classList.remove('sel'); updateConfirm(); };
  fieldBtn.onclick = ()=>{ choice='field'; fieldBtn.classList.add('sel'); batBtn.classList.remove('sel'); updateConfirm(); };
  choiceRow.appendChild(batBtn); choiceRow.appendChild(fieldBtn);
  wrap.appendChild(choiceRow);

  const confirmBtn = el('<button class="btn-primary" disabled style="opacity:0.4;">Confirm toss</button>');
  function updateConfirm(){ confirmBtn.disabled=!(winner&&choice); confirmBtn.style.opacity=confirmBtn.disabled?'0.4':'1'; }
  confirmBtn.onclick = ()=>{
    if(confirmBtn.disabled) return;
    M.toss = { callingTeam:null, call:'manual', result:'manual', winner, choice:null };
    tossManualMode = false;
    confirmTossChoice(choice);
  };
  wrap.appendChild(confirmBtn);

  const backBtn = el('<button class="btn-ghost" style="margin-top:10px;">← Use coin flip instead</button>');
  backBtn.onclick = ()=>{ tossManualMode = false; render(); };
  wrap.appendChild(backBtn);
  return wrap;
}

function renderOpenersScreen(){
  const inn = curInn();
  const battingName = M.teamNames[inn.battingTeam];
  const bowlingName = M.teamNames[inn.bowlingTeam];
  const wrap = el(`<div class="wrap"><h2 style="font-size:20px; margin-bottom:4px;">Innings ${M.curInnIdx+1} of 2</h2>
  <p class="hint" style="margin-bottom:14px;">${battingName} are batting. ${bowlingName} are bowling.</p>
  <div id="openerForm"></div></div>`);
  const formDiv = wrap.querySelector('#openerForm');

  let pickStriker=null, pickNonStriker=null, pickBowler=null;

  function section(title, key){
    const sec = el(`<div class="card"><div class="sectitle" style="margin:0 0 10px;">${title}</div><div class="opt-grid" id="grid_${key}"></div></div>`);
    const grid = sec.querySelector('.opt-grid');
    grid.style.gridTemplateColumns = 'repeat(2,1fr)';
    const team = (key==='bowler') ? inn.bowlingTeam : inn.battingTeam;
    teamSquad(team).forEach((name,idx)=>{
      const id = team+'_'+idx;
      const b = document.createElement('button');
      b.className='opt-btn'; b.style.fontSize='13px'; b.textContent = name;
      b.onclick = ()=>{
        grid.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel');
        if(key==='striker') pickStriker=id;
        if(key==='nonstriker') pickNonStriker=id;
        if(key==='bowler') pickBowler=id;
        updateConfirm();
      };
      grid.appendChild(b);
    });
    return sec;
  }
  formDiv.appendChild(section('Opening striker — '+battingName,'striker'));
  formDiv.appendChild(section('Opening non-striker — '+battingName,'nonstriker'));
  formDiv.appendChild(section('Opening bowler — '+bowlingName,'bowler'));
  const confirmBtn = el('<button class="btn-primary" disabled style="opacity:0.4;">Confirm &amp; start</button>');
  formDiv.appendChild(confirmBtn);
  function updateConfirm(){
    const ok = pickStriker && pickNonStriker && pickBowler && pickStriker!==pickNonStriker;
    confirmBtn.disabled = !ok;
    confirmBtn.style.opacity = ok? '1':'0.4';
  }
  confirmBtn.onclick = ()=>{ if(!confirmBtn.disabled) confirmOpeners(pickStriker,pickNonStriker,pickBowler); };
  return wrap;
}

    <div class="sb-top">
      <div class="sb-team">${M.teamNames[inn.battingTeam]}</div>
      <div class="sb-innlabel">Innings ${M.curInnIdx+1} of 2</div>
